services:
  - type: web
    name: center-api
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: center-db
          property: connectionString

databases:
  - name: center-db
    databaseName: center_app
    plan: free
